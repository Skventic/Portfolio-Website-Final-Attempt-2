project:
  type: website
  output-dir: _site

website:
  title: "Savannah Ventic"
  site-url: "https://yourusername.github.io/portfolio"
  description: "Savannah Ventic's professional portfolio in marketing, promotional marketing, consumer behavior, and advertising."
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Dashboard"
        href: dashboard.qmd
      - text: "Presentation"
